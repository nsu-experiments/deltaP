# deltaP/cli/templates/module/generic/module_visualize.toml.template
# Visualization configuration for default
# Generated by ΔP package manager

[metadata]
module = "default"
domain = "generic"

[charts]
# Which composed charts to generate by default
# Options: comparison, eda, sensitivity
enabled = ["comparison"]

[charts.comparison]
# Route/category comparison settings
route_col = "route"
success_col = "composite_success"
# Define route names if needed
# route_names = {1 = "Route A", 2 = "Route B", 3 = "Route C"}

[charts.eda]
# Exploratory Data Analysis
enabled = false
# Columns to analyze
# value_cols = ["efficiency", "service_quality"]

[charts.sensitivity]
# Scenario/parameter sensitivity analysis
enabled = false
# scenario_col = "scenario"

[output]
format = "png"
dpi = 300
directory = "results/plots"

[style]
# Matplotlib style
style = "seaborn-v0_8-whitegrid"
# Color palette
# colors = ["#2196F3", "#4CAF50", "#F44336", "#FF9800"]