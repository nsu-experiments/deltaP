# deltaP/cli/templates/module/manufacturing/visualize.toml.template
# Visualization configuration for manufacturing (manufacturing domain)
# Generated by ΔP package manager

[metadata]
module = "manufacturing"
domain = "manufacturing"

[charts]
# Which composed charts to generate by default
enabled = ["comparison"]

[charts.comparison]
# Route comparison with confidence intervals
route_col = "route"
success_col = "composite"
route_names = {1 = "Route A", 2 = "Route B", 3 = "Hybrid"}

[charts.kpi_breakdown]
# KPI component comparison (disabled - needs aggregated stats)
enabled = false
route_col = "route"
scenario_col = "scenario"
baseline_scenario = 1
kpi_cols = ["efficiency", "service", "sustainability"]
kpi_labels = ["Transport Efficiency", "Service Quality", "Sustainability"]

[charts.scenario_sensitivity]
# Multi-scenario resilience analysis (disabled - needs multiple scenarios)
enabled = false
route_col = "route"
scenario_col = "scenario"
success_col = "composite"
ci_enabled = false
scenario_names = {1 = "Baseline", 2 = "Disruption A", 3 = "Disruption B", 4 = "Combined"}

[charts.eda]
# Exploratory Data Analysis
enabled = false
value_cols = ["efficiency", "service", "sustainability", "composite"]
category_col = "route"

[output]
format = "png"
dpi = 300
directory = "results/plots"

[style]
style = "seaborn-v0_8-whitegrid"
colors = ["#4CAF50", "#F44336", "#2196F3", "#FF9800"]